<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pot Tracker - FFXIV Occult Crescent</title>
  <meta name="description" content="Track Pot of Plenty FATE spawn timers across Chaos, OCE, and Light data centers in FFXIV's Occult Crescent zone." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏺</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-particles" id="bgParticles" aria-hidden="true"></div>

  <header class="header">
    <div class="header-glow" aria-hidden="true"></div>
    <h1 class="title">
      <span class="title-icon" aria-hidden="true">✦</span>
      Pot Tracker
      <span class="title-icon" aria-hidden="true">✦</span>
    </h1>
    <p class="subtitle">Occult Crescent - Triple Dip Route</p>
    <div class="route-badge">
      <span class="route-step" data-dc="chaos">Chaos</span>
      <span class="route-arrow">→</span>
      <span class="route-step" data-dc="oce">OCE</span>
      <span class="route-arrow">→</span>
      <span class="route-step" data-dc="light">Light</span>
    </div>
  </header>

  <main class="main">
    <!-- Data center cards are generated by script.js from one template -->
    <div class="dc-grid" id="dcGrid"></div>

    <!-- Next Spawn -->
    <section class="panel next-panel">
      <div class="panel-accent" aria-hidden="true"></div>
      <h3 class="panel-title">Next Spawn</h3>
      <div class="next-content" id="nextUpContent">
        <p class="muted">No active timers - hit "Pot Spawned!" when a FATE pops</p>
      </div>
    </section>

    <!-- Pot Coffer Map -->
    <section class="panel map-panel">
      <button class="map-toggle" id="mapToggle" aria-expanded="false" aria-controls="mapContent">
        <span class="map-toggle-icon" id="mapToggleIcon" aria-hidden="true">▶</span>
        <span>Pot Coffer Map</span>
        <span class="map-hint">tap image to zoom</span>
      </button>
      <div class="map-content" id="mapContent">
        <img
          src="South_Horn_Pot_Coffers_Color_Coded.jpg"
          alt="South Horn Pot Coffer Locations - Color Coded Map"
          class="map-image"
          id="mapImage"
          loading="lazy"
        />
      </div>
    </section>

    <!-- History -->
    <section class="panel history-panel">
      <div class="panel-header">
        <h3 class="panel-title">Spawn History</h3>
        <button class="btn btn-ghost btn-danger-ghost" id="clearHistory">Clear</button>
      </div>
      <div class="history-list" id="historyList">
        <p class="muted">No spawns recorded yet</p>
      </div>
    </section>
  </main>

  <footer class="footer">
    Pot Tracker for FFXIV Occult Crescent • Data persists in your browser
  </footer>

  <!-- Fullscreen map lightbox -->
  <div class="lightbox hidden" id="lightbox" role="dialog" aria-label="Pot coffer map, full size">
    <button class="lightbox-close" id="lightboxClose" aria-label="Close map">✕</button>
    <div class="lightbox-scroll">
      <img
        src="South_Horn_Pot_Coffers_Color_Coded.jpg"
        alt="South Horn Pot Coffer Locations - Color Coded Map, full size"
        class="lightbox-img"
      />
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
